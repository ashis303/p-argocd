apiVersion: v1
kind: ConfigMap
metadata:
  name: python-app-config
  namespace: python-app
  labels:
    app: python-app
data:
  # Application environment (overridden in overlays)
  APP_ENV: "development"
  
  # Application version
  APP_VERSION: "1.0.0"
  
  # Debug mode (overridden in overlays)
  DEBUG_MODE: "false"
  
  # Logging configuration
  LOG_LEVEL: "INFO"
  
  # Additional configuration
  MAX_CONNECTIONS: "100"
  TIMEOUT: "30"