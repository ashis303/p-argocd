apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base resources
resources:
  - ../../base

# Namespace for dev environment
namespace: python-app-dev

# Patches for dev environment
patches:
  # Patch deployment for dev-specific settings
  - target:
      kind: Deployment
      name: python-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

# Patch ConfigMap for dev-specific config
  - target:
      kind: ConfigMap
      name: python-app-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: development
      - op: replace
        path: /data/DEBUG_MODE
        value: "true"
      - op: replace
        path: /data/LOG_LEVEL
        value: DEBUG